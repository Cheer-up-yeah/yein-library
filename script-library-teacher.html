<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="예인 희곡 도서관">
<meta name="theme-color" content="#ffffff">
<title>예인 희곡 도서관 · 하다효지 선생님용</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700;900&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');

  :root{
    --bg: #ffffff;
    --paper: #ffffff;
    --paper-2: #f6f5f2;
    --line: #e7dfcb;
    --ink: #221d15;
    --ink-soft: #574f3d;
    --muted: #9a927c;
    --wine: #8d4048;
    --wine-deep: #6d3036;
    --brass: #9d6a23;
    --ok: #405c63;
    --ok-bg: #eff3f4;
    --warn: #7a3a41;
    --warn-bg: #f6eff0;
  }

  *{box-sizing:border-box; margin:0; padding:0;}
  html{ -webkit-text-size-adjust:100%; }

  body{
    min-height:100vh;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Noto Sans KR', sans-serif;
  }

  .hidden{ display:none !important; }
  button{ font-family:'Noto Sans KR', sans-serif; cursor:pointer; border:none; background:none; }
  input{ font-family:'Noto Sans KR', sans-serif; }
  input:focus-visible, button:focus-visible{
    outline: 2px solid var(--brass);
    outline-offset: 2px;
  }

  .topbar{
    display:flex;
    align-items:center;
    gap:14px;
    padding: 16px clamp(16px, 4vw, 40px);
    border-bottom: 1px solid var(--line);
    position: sticky;
    top:0;
    background: var(--bg);
    z-index:10;
  }
  .logo-img{
    height: clamp(26px, 6vw, 36px);
    width: auto;
    flex-shrink:0;
    display:block;
  }
  .topbar-name{
    font-family:'Noto Serif KR', serif;
    font-weight:700;
    font-size:16px;
    color: var(--ink);
  }
  .topbar-tag{
    margin-left:auto;
    font-size:11px;
    font-weight:700;
    letter-spacing:0.08em;
    color: var(--wine);
    background: var(--warn-bg);
    padding:5px 10px;
    border-radius:20px;
  }

  .page{ padding: clamp(28px, 5vw, 56px) clamp(16px, 4vw, 40px) 90px; }
  .narrow{ max-width: 460px; margin: 0 auto; }
  .wide{ max-width: 960px; margin: 0 auto; }

  .eyebrow{
    font-family:'Noto Serif KR', serif;
    font-size:11px;
    letter-spacing:0.3em;
    color: var(--brass);
    text-transform:uppercase;
    margin-bottom:10px;
  }
  h1.title{
    font-family:'Noto Serif KR', serif;
    font-weight:900;
    font-size: clamp(24px, 4.2vw, 34px);
    line-height:1.35;
    color: var(--ink);
    margin-bottom:30px;
  }

  .field{ margin-bottom:20px; }
  .field label{
    display:block;
    font-size:12px;
    color: var(--wine);
    letter-spacing:0.08em;
    margin-bottom:8px;
    font-weight:600;
  }
  .field input{
    width:100%;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius:6px;
    padding: 12px 14px;
    font-size:15px;
    color: var(--ink);
    transition: border-color .2s;
  }
  .field input::placeholder{ color: var(--muted); }
  .field input:focus{ border-color: var(--brass); }

  .btn-primary{
    width:100%;
    margin-top: 8px;
    padding: 15px;
    background: var(--wine);
    color: #fff;
    font-size:14px;
    letter-spacing:0.1em;
    font-weight:600;
    border-radius: 6px;
    transition: background .2s, transform .15s;
  }
  .btn-primary:hover{ background: var(--wine-deep); }
  .btn-primary:active{ transform: translateY(1px); }

  .login-error{ font-size:12px; color: var(--warn); margin: -8px 0 16px; min-height:14px; }

  .link-btn{
    width:100%;
    margin-top:14px;
    text-align:center;
    display:block;
    color: var(--muted);
    font-size:12px;
    text-decoration:underline;
    text-underline-offset:3px;
  }
  .link-btn:hover{ color: var(--wine); }

  .home-header{
    display:flex;
    flex-wrap:wrap;
    align-items:flex-end;
    justify-content:space-between;
    gap:16px;
    margin-bottom: 20px;
    padding-bottom:18px;
    border-bottom: 1px solid var(--line);
  }
  .whoami{ font-size:12px; color: var(--muted); text-align:right; }
  .whoami b{ color: var(--ink); font-weight:700; }
  .whoami button{
    display:block;
    margin-top:6px;
    color: var(--muted);
    font-size:11px;
    text-decoration:underline;
    text-underline-offset:3px;
  }
  .whoami button:hover{ color: var(--wine); }
  .whoami-actions{
    display:flex;
    gap:10px;
    justify-content:flex-end;
    margin-top:6px;
  }
  .whoami-actions button{ margin-top:0; }

  .view-tabs{ display:flex; gap:8px; margin-bottom:22px; }
  .view-tab{
    padding:9px 16px;
    border-radius:20px;
    font-size:13px;
    font-weight:600;
    border:1px solid var(--line);
    background:var(--paper);
    color:var(--ink-soft);
    transition: all .15s;
  }
  .view-tab.active{ background:var(--ink); color:#fff; border-color:var(--ink); }
  .view-tab:hover:not(.active){ border-color:var(--brass); }

  .cat-tabs{
    display:flex;
    gap:8px;
    overflow-x:auto;
    padding-bottom:6px;
    margin-bottom:18px;
    scrollbar-width:none;
  }
  .cat-tabs::-webkit-scrollbar{ display:none; }
  .cat-chip{
    flex-shrink:0;
    padding:8px 15px;
    border-radius:20px;
    border:1px solid var(--line);
    background:var(--paper);
    color:var(--ink-soft);
    font-size:13px;
    font-weight:600;
    transition: all .15s;
  }
  .cat-chip.active{ background:var(--wine); border-color:var(--wine); color:#fff; }
  .cat-chip:hover:not(.active){ border-color:var(--brass); }

  .list-caption{ font-size:12px; color: var(--muted); margin-bottom:20px; }

  .review-list{ display:flex; flex-direction:column; gap:14px; }
  .review-card{
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 16px 18px;
  }
  .review-meta{
    display:flex;
    flex-wrap:wrap;
    align-items:baseline;
    gap:10px;
    margin-bottom:8px;
  }
  .review-book{
    font-family:'Noto Serif KR', serif;
    font-weight:700;
    font-size:13px;
    color: var(--wine);
  }
  .review-author{ font-size:12px; font-weight:600; color: var(--ink-soft); }
  .review-date{ font-size:11px; color: var(--muted); }
  .review-text{ font-size:14px; color: var(--ink); line-height:1.7; white-space:pre-line; }
  .anon-tag{
    font-size:11px;
    color: var(--muted);
    border:1px solid var(--line);
    border-radius:10px;
    padding:2px 8px;
    margin-left:6px;
  }

  .book-grid{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap:16px;
  }

  .empty-state{
    grid-column: 1 / -1;
    padding:44px 20px;
    text-align:center;
    color: var(--muted);
    font-size:13px;
    background: var(--paper);
    border:1px dashed var(--line);
    border-radius:10px;
  }

  .ticket{
    position:relative;
    display:flex;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 10px;
    overflow:hidden;
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .ticket:hover{ transform: translateY(-2px); box-shadow: 0 10px 24px rgba(34,29,21,0.08); }

  .ticket-main{
    flex:1;
    min-width:0;
    padding: 18px 16px;
    text-align:left;
    display:block;
  }
  .ticket-play{
    font-family:'Noto Serif KR', serif;
    font-weight:700;
    font-size:18px;
    color: var(--ink);
    margin-bottom:6px;
  }
  .ticket-author{
    font-size:12px;
    color: var(--muted);
    margin:-2px 0 8px;
  }
  .ticket-meta{ font-size:12px; color: var(--ink-soft); line-height:1.7; }
  .ticket-meta span.k{ color: var(--wine); font-weight:600; margin-right:4px; }

  .ticket-stub{
    width:92px;
    flex-shrink:0;
    background: var(--paper-2);
    border-left: 1px dashed var(--line);
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
  }
  .ticket-stub::before, .ticket-stub::after{
    content:"";
    position:absolute;
    left:-7px;
    width:14px; height:14px;
    background: var(--bg);
    border-radius:50%;
  }
  .ticket-stub::before{ top:-7px; }
  .ticket-stub::after{ bottom:-7px; }

  .status-tag{
    font-family:'Noto Serif KR', serif;
    font-size:12px;
    font-weight:700;
    padding:6px 10px;
    border-radius:20px;
    text-align:center;
  }
  .status-tag.avail{ color: var(--ok); background: var(--ok-bg); }
  .status-tag.busy{ color: var(--warn); background: var(--warn-bg); }

  .stamp{
    position:absolute;
    top:12px; right:12px;
    font-family:'Noto Serif KR', serif;
    font-weight:900;
    font-size:11px;
    color: var(--warn);
    border: 1.5px solid var(--warn);
    border-radius:4px;
    padding:2px 7px;
    transform: rotate(6deg);
  }

  /* ---------- history table ---------- */
  .table-scroll{ overflow-x:auto; border:1px solid var(--line); border-radius:10px; }
  .history-table{ width:100%; border-collapse:collapse; font-size:13px; min-width:640px; }
  .history-table th, .history-table td{ text-align:left; padding:12px 14px; border-bottom:1px solid var(--line); white-space:nowrap; }
  .history-table tbody tr:last-child td{ border-bottom:none; }
  .history-table th{
    color:var(--muted);
    font-weight:600;
    font-size:11px;
    letter-spacing:0.05em;
    background: var(--paper);
  }
  .history-table td.title-cell{ font-family:'Noto Serif KR', serif; font-weight:600; white-space:normal; }
  .history-status{ display:inline-block; padding:4px 10px; border-radius:12px; font-size:11px; font-weight:700; }
  .history-status.ongoing{ background:var(--warn-bg); color:var(--warn); }
  .history-status.done{ background:var(--ok-bg); color:var(--ok); }

  /* ---------- detail modal ---------- */
  .modal-veil{
    position:fixed; inset:0;
    background: rgba(34,29,21,0.45);
    display:flex; align-items:center; justify-content:center;
    z-index:20; padding:20px;
  }
  .modal-card{
    background: #fff;
    color: var(--ink);
    border-radius:12px;
    max-width:400px;
    width:100%;
    padding: 30px 26px 26px;
    box-shadow: 0 24px 60px rgba(34,29,21,0.25);
  }
  .modal-card .eyebrow{ margin-bottom:6px; }
  .modal-book-title{
    font-family:'Noto Serif KR', serif;
    font-weight:800;
    font-size:22px;
    margin-bottom:18px;
    padding-bottom:16px;
    border-bottom:1px solid var(--line);
  }
  .detail-row{
    display:flex;
    justify-content:space-between;
    gap:16px;
    font-size:13px;
    padding: 9px 0;
    border-bottom: 1px dashed var(--line);
  }
  .detail-row:last-of-type{ border-bottom:none; }
  .detail-row .k{ color: var(--muted); flex-shrink:0; }
  .detail-row .v{ color: var(--ink); font-weight:600; text-align:right; }

  .purpose-box{
    margin-top:16px;
    background: var(--paper);
    border:1px solid var(--line);
    border-radius:8px;
    padding:14px;
  }
  .purpose-box .k{
    font-size:11px;
    color: var(--brass);
    letter-spacing:0.08em;
    font-weight:600;
    margin-bottom:6px;
  }
  .purpose-box .v{ font-size:14px; color: var(--ink-soft); line-height:1.6; }

  .available-note{
    margin-top:6px;
    font-size:13px;
    color: var(--ok);
    background: var(--ok-bg);
    border-radius:8px;
    padding:12px 14px;
  }

  .modal-actions{ display:flex; gap:10px; margin-top:22px; }
  .modal-actions button{
    flex:1;
    padding: 12px;
    border-radius:6px;
    font-size:13px;
    letter-spacing:0.04em;
    font-weight:600;
  }
  .modal-actions .close-btn{ background: var(--paper); color: var(--ink-soft); border:1px solid var(--line); }
  .modal-actions .close-btn:hover{ border-color: var(--brass); }
  .modal-actions .btn-solid{ background: var(--wine); color:#fff; }
  .modal-actions .btn-solid:hover{ background: var(--wine-deep); }
  .modal-actions .danger-btn{ background: var(--warn); color:#fff; }
  .modal-actions .danger-btn:hover{ opacity:0.88; }

  .status-toolbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    flex-wrap:wrap;
    margin-bottom:20px;
  }
  .status-toolbar .list-caption{ margin-bottom:0; }
  .toolbar-btns{ display:flex; gap:8px; flex-wrap:wrap; }
  .btn-add-book{
    flex-shrink:0;
    background: var(--wine);
    color:#fff;
    padding:9px 16px;
    border-radius:20px;
    font-size:13px;
    font-weight:600;
    letter-spacing:0.02em;
    transition: background .2s;
  }
  .btn-add-book:hover{ background: var(--wine-deep); }
  .btn-add-book.outline{
    background: var(--paper);
    color: var(--wine);
    border: 1px solid var(--wine);
  }
  .btn-add-book.outline:hover{ background: var(--warn-bg); }

  .search-input{
    width:100%;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius:8px;
    padding: 11px 14px;
    font-size:14px;
    color: var(--ink);
    margin-bottom:16px;
  }
  .search-input::placeholder{ color: var(--muted); }
  .search-input:focus{ border-color: var(--brass); outline: 2px solid var(--brass); outline-offset:1px; }

  .field select{
    width:100%;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius:6px;
    padding: 12px 14px;
    font-size:15px;
    color: var(--ink);
    font-family:'Noto Sans KR', sans-serif;
  }
  .field select:focus{ border-color: var(--brass); outline: 2px solid var(--brass); outline-offset:2px; }



  #toast{
    position:fixed;
    bottom: 26px; left:50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--wine);
    color: #fff;
    font-size:13px;
    font-weight:600;
    padding: 13px 22px;
    border-radius: 8px;
    opacity:0;
    pointer-events:none;
    transition: opacity .25s, transform .25s;
    z-index:30;
    box-shadow: 0 10px 24px rgba(34,29,21,0.25);
  }
  #toast.show{ opacity:1; transform: translateX(-50%) translateY(0); }

  @media (min-width: 600px){ .book-grid{ grid-template-columns: repeat(2, 1fr); } }
  @media (min-width: 1024px){ .wide{ max-width: 960px; } }
  @media (max-width: 400px){
    .ticket-stub{ width:76px; }
    .status-tag{ font-size:11px; padding:5px 7px; }
  }
  @media (prefers-reduced-motion: reduce){ *{ transition:none !important; } }
</style>
</head>

  async function importDefaultBooks(){
    const snap = await getDocs(collection(db, 'books'));
    const existingByTitle = new Map(snap.docs.map(d=> [d.data().title, { id:d.id, ...d.data() }]));

    let added = 0, updated = 0;
    for(const b of DEFAULT_BOOKS){
      const existing = existingByTitle.get(b.title);
      if(!existing){
        await addDoc(collection(db, 'books'), {
          title: b.title, author: b.author || null, category: b.category,
          status:'available', borrower:null, phone:null, loanDate:null, returnDate:null, purpose:null
        });
        added++;
      } else if(!existing.author && b.author){
        await updateDoc(doc(db, 'books', existing.id), { author: b.author });
        updated++;
      }
    }
    return { added, updated };
  }

  function listenAll(){
    if(unsubBooks) unsubBooks();
    unsubBooks = onSnapshot(collection(db, 'books'), (snap)=>{
      booksCache = snap.docs.map(d=> ({ id:d.id, ...d.data() }));
      renderBookList();
    });

    if(unsubHistory) unsubHistory();
    const hq = query(collection(db, 'loanHistory'), orderBy('createdAt', 'desc'));
    unsubHistory = onSnapshot(hq, (snap)=>{
      historyCache = snap.docs.map(d=> d.data());
      renderHistory();
    });

    if(unsubReviews) unsubReviews();
    const rq = query(collection(db, 'reviews'), orderBy('createdAt', 'desc'));
    unsubReviews = onSnapshot(rq, (snap)=>{
      reviewsCache = snap.docs.map(d=> d.data());
      renderReviews();
    });
  }

  function stopListening(){
    if(unsubBooks){ unsubBooks(); unsubBooks = null; }
    if(unsubHistory){ unsubHistory(); unsubHistory = null; }
    if(unsubReviews){ unsubReviews(); unsubReviews = null; }
  }

  function toKoreanDate(ymd){
    if(!ymd) return '';
    const [y,m,d] = ymd.split('-').map(Number);
    return `${y}년 ${m}월 ${d}일`;
  }
  function todayKST(){
    const fmt = new Intl.DateTimeFormat('en-CA', { timeZone:'Asia/Seoul', year:'numeric', month:'2-digit', day:'2-digit' });
    return fmt.format(new Date());
  }

    const t = document.getElementById('toast');

  }
  function escapeHtml(str){
    return str.replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
  }
  function show(id){
    ['view-login','view-signup','view-home'].forEach(v=>{
      document.getElementById(v).classList.toggle('hidden', v!==id);
    });
  }

  document.getElementById('btn-goto-signup').addEventListener('click', ()=>{
    document.getElementById('signup-name').value = '';
    document.getElementById('signup-username').value = '';
    document.getElementById('signup-password').value = '';
    document.getElementById('signup-phone').value = '';
    document.getElementById('signup-error').textContent = '';
    show('view-signup');
  });

  document.getElementById('btn-goto-login').addEventListener('click', ()=>{
    document.getElementById('login-error').textContent = '';
    show('view-login');
  });

  document.getElementById('btn-signup').addEventListener('click', async ()=>{
    const name = document.getElementById('signup-name').value.trim();
    const username = document.getElementById('signup-username').value.trim();
    const password = document.getElementById('signup-password').value;
    const phone = document.getElementById('signup-phone').value.trim();
    const err = document.getElementById('signup-error');
    const btn = document.getElementById('btn-signup');

    if(!name || !username || !password || !phone){
      err.textContent = '이름, 아이디, 비밀번호, 전화번호를 모두 입력해주세요.';
      return;
    }
    if(password.length < 6){
      err.textContent = '비밀번호는 6자 이상으로 입력해주세요.';
      return;
    }
    err.textContent = '';
    btn.disabled = true;

    try{
      const cred = await createUserWithEmailAndPassword(auth, username + EMAIL_DOMAIN, password);
      await setDoc(doc(db, 'users', cred.user.uid), { name, username, phone, role:'teacher' });
      await signOut(auth);

      document.getElementById('login-username').value = username;
      document.getElementById('login-password').value = '';
      document.getElementById('login-error').textContent = '';
      show('view-login');
      showToast('회원가입이 완료되었습니다. 로그인해주세요.');
    } catch(e){
      if(e.code === 'auth/email-already-in-use') err.textContent = '이미 사용 중인 아이디입니다.';
      else if(e.code === 'auth/weak-password') err.textContent = '비밀번호는 6자 이상으로 입력해주세요.';
      else err.textContent = '회원가입에 실패했습니다. 잠시 후 다시 시도해주세요.';
    } finally {
      btn.disabled = false;
    }
  });

  document.getElementById('btn-login').addEventListener('click', async ()=>{
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;
    const err = document.getElementById('login-error');
    const btn = document.getElementById('btn-login');

    if(!username || !password){
      err.textContent = '아이디와 비밀번호를 모두 입력해주세요.';
      return;
    }
    err.textContent = '';
    btn.disabled = true;

    try{
      const cred = await signInWithEmailAndPassword(auth, username + EMAIL_DOMAIN, password);
      const profileSnap = await getDoc(doc(db, 'users', cred.user.uid));
      if(!profileSnap.exists() || profileSnap.data().role !== 'teacher'){
        await signOut(auth);
        err.textContent = '선생님 계정이 아닙니다.';
        return;
      }
      const profile = profileSnap.data();
      currentUser = { uid: cred.user.uid, name: profile.name, username: profile.username, phone: profile.phone };
      document.getElementById('whoami-name').textContent = profile.name;
      activeCategory = '전체';
      switchView('status');
      renderCatTabs();
      listenAll();
      show('view-home');
    } catch(e){
      err.textContent = '아이디 또는 비밀번호가 일치하지 않습니다.';
    } finally {
      btn.disabled = false;
    }
  });

  document.getElementById('btn-logout').addEventListener('click', async ()=>{
    stopListening();
    await signOut(auth);
    currentUser = null;
    document.getElementById('login-username').value = '';
    document.getElementById('login-password').value = '';
    show('view-login');
  });

  document.getElementById('btn-change-pw').addEventListener('click', ()=>{
    document.getElementById('pw-current').value = '';
    document.getElementById('pw-new').value = '';
    document.getElementById('pw-confirm').value = '';
    document.getElementById('pw-error').textContent = '';
    document.getElementById('pw-veil').classList.remove('hidden');
  });

  document.getElementById('pw-cancel').addEventListener('click', ()=>{
    document.getElementById('pw-veil').classList.add('hidden');
  });

  document.getElementById('pw-submit').addEventListener('click', async ()=>{
    const current = document.getElementById('pw-current').value;
    const next = document.getElementById('pw-new').value;
    const confirmVal = document.getElementById('pw-confirm').value;
    const err = document.getElementById('pw-error');

    if(next.length < 6){
      err.textContent = '새 비밀번호는 6자 이상으로 입력해주세요.';
      return;
    }
    if(next !== confirmVal){
      err.textContent = '새 비밀번호가 서로 일치하지 않습니다.';
      return;
    }

    try{
      const credential = EmailAuthProvider.credential(auth.currentUser.email, current);
      await reauthenticateWithCredential(auth.currentUser, credential);
      await updatePassword(auth.currentUser, next);
      document.getElementById('pw-veil').classList.add('hidden');
      showToast('비밀번호가 변경되었습니다.');
    } catch(e){
      err.textContent = '현재 비밀번호가 일치하지 않습니다.';
    }
  });

  document.querySelectorAll('.view-tab').forEach(btn=>{
    btn.addEventListener('click', ()=> switchView(btn.dataset.view));
  });

  function switchView(view){
    activeView = view;
    document.getElementById('tab-status').classList.toggle('active', view==='status');
    document.getElementById('tab-history').classList.toggle('active', view==='history');
    document.getElementById('tab-reviews').classList.toggle('active', view==='reviews');
    document.getElementById('panel-status').classList.toggle('hidden', view!=='status');
    document.getElementById('panel-history').classList.toggle('hidden', view!=='history');
    document.getElementById('panel-reviews').classList.toggle('hidden', view!=='reviews');
  }

  document.getElementById('search-input').addEventListener('input', (e)=>{
    searchQuery = e.target.value;
    renderBookList();
  });

  function renderCatTabs(){
    const wrap = document.getElementById('cat-tabs');
    const cats = ['전체', ...CATEGORIES];
    wrap.innerHTML = cats.map(c=>
      `<button class="cat-chip ${c===activeCategory?'active':''}" data-cat="${c}">${c}</button>`
    ).join('');
    wrap.querySelectorAll('.cat-chip').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        activeCategory = btn.dataset.cat;
        renderCatTabs();
        renderBookList();
      });
    });
  }

  function renderBookList(){
    const wrap = document.getElementById('book-list');
    wrap.innerHTML = '';
    let filtered = activeCategory === '전체' ? booksCache : booksCache.filter(b=> b.category === activeCategory);

    const q = searchQuery.trim().toLowerCase();
    if(q){
      filtered = filtered.filter(b=>
        b.title.toLowerCase().includes(q) || (b.author && b.author.toLowerCase().includes(q))
      );
    }

    if(filtered.length === 0){
      wrap.innerHTML = `<div class="empty-state">${q ? '검색 결과가 없습니다.' : '아직 등록된 도서가 없습니다.'}</div>`;
      return;
    }

    filtered.forEach(b=>{
      const isBusy = b.status === 'borrowed';
      const card = document.createElement('div');
      card.className = 'ticket';
      card.innerHTML = `
        <button class="ticket-main" data-id="${b.id}">
          ${isBusy ? '<div class="stamp">대출중</div>' : ''}
          <div class="ticket-play">${b.title}</div>
          ${b.author ? `<div class="ticket-author">${escapeHtml(b.author)}</div>` : ''}
          <div class="ticket-meta">
            ${isBusy
              ? `<div><span class="k">대출자</span>${b.borrower}</div>
                 <div><span class="k">대출기간</span>${toKoreanDate(b.loanDate)} ~ ${toKoreanDate(b.returnDate)}</div>`
              : `<div>현재 대출 가능 상태입니다.</div>`
            }
          </div>
        </button>
        <div class="ticket-stub">
          <span class="status-tag ${isBusy ? 'busy' : 'avail'}">${isBusy ? '대출중' : '대출가능'}</span>
        </div>
      `;
      wrap.appendChild(card);
    });

    wrap.querySelectorAll('.ticket-main').forEach(btn=>{
      btn.addEventListener('click', ()=> openDetail(btn.dataset.id));
    });
  }

  function openDetail(id){
    const book = booksCache.find(b=> b.id === id);
    if(!book) return;
    modalBookId = id;
    document.getElementById('modal-book-title').textContent = book.title;
    const body = document.getElementById('modal-body');
    const actions = document.getElementById('modal-actions');

    if(book.status === 'borrowed'){
      body.innerHTML = `
        ${book.author ? `<div class="detail-row"><span class="k">저자</span><span class="v">${book.author}</span></div>` : ''}
        <div class="detail-row"><span class="k">대출자</span><span class="v">${book.borrower}</span></div>
        <div class="detail-row"><span class="k">연락처</span><span class="v">${book.phone}</span></div>
        <div class="detail-row"><span class="k">분류</span><span class="v">${book.category}</span></div>
        <div class="detail-row"><span class="k">대출일</span><span class="v">${toKoreanDate(book.loanDate)}</span></div>
        <div class="detail-row"><span class="k">반납 예정일</span><span class="v">${toKoreanDate(book.returnDate)}</span></div>
        <div class="purpose-box">
          <div class="k">사용 목적</div>
          <div class="v">${book.purpose ? book.purpose : '입력하지 않음'}</div>
        </div>
        <div class="available-note" style="margin-top:14px; background:var(--warn-bg); color:var(--warn);">대출 중인 도서는 삭제할 수 없습니다. 반납 후 삭제해주세요.</div>
      `;
      actions.innerHTML = `
        <button class="close-btn" id="modal-close">닫기</button>
        <button class="btn-solid" id="modal-edit">정보 수정</button>
      `;
    } else {
      body.innerHTML = `
        ${book.author ? `<div class="detail-row"><span class="k">저자</span><span class="v">${book.author}</span></div>` : ''}
        <div class="detail-row"><span class="k">분류</span><span class="v">${book.category}</span></div>
        <div class="available-note">현재 대출 기록이 없습니다 — 대출 가능한 상태입니다.</div>
      `;
      actions.innerHTML = `
        <button class="close-btn" id="modal-close">닫기</button>
        <button class="btn-solid" id="modal-edit">정보 수정</button>
        <button class="danger-btn" id="modal-delete">도서 삭제하기</button>
      `;
    }

    document.getElementById('modal-close').addEventListener('click', closeModal);
    const deleteBtn = document.getElementById('modal-delete');
    if(deleteBtn){
      deleteBtn.addEventListener('click', ()=> deleteBook(book));
    }
    const editBtn = document.getElementById('modal-edit');
    if(editBtn){
      editBtn.addEventListener('click', ()=>{ closeModal(); openEditBook(book); });
    }
    document.getElementById('modal-veil').classList.remove('hidden');
  }

  async function deleteBook(book){
    const ok = window.confirm(`「${book.title}」을(를) 정말 삭제하시겠어요?\n이 작업은 되돌릴 수 없습니다.`);
    if(!ok) return;
    try{
      await deleteDoc(doc(db, 'books', book.id));
      closeModal();
      showToast(`${book.title} 도서가 삭제되었습니다.`);
    } catch(e){
      showToast('삭제 중 오류가 발생했습니다. 다시 시도해주세요.');
    }
  }

  function closeModal(){
    document.getElementById('modal-veil').classList.add('hidden');
    modalBookId = null;
  }

  function renderHistory(){
    const body = document.getElementById('history-body');
    if(historyCache.length === 0){
      body.innerHTML = `<tr><td colspan="7"><div class="empty-state" style="margin:4px 0;">아직 대출 기록이 없습니다.</div></td></tr>`;
      return;
    }
    body.innerHTML = historyCache.map(h=> `
      <tr>
        <td class="title-cell">${h.title}</td>
        <td>${h.category}</td>
        <td>${h.borrower}</td>
        <td>${toKoreanDate(h.loanDate)}</td>
        <td>${toKoreanDate(h.returnDate)}</td>
        <td>${h.actualReturn ? toKoreanDate(h.actualReturn) : '—'}</td>
        <td><span class="history-status ${h.status==='done' ? 'done' : 'ongoing'}">${h.status==='done' ? '완료' : '진행중'}</span></td>
      </tr>
    `).join('');
  }

  function renderReviews(){
    const wrap = document.getElementById('review-list');
    if(reviewsCache.length === 0){
      wrap.innerHTML = `<div class="empty-state">아직 등록된 후기가 없습니다.</div>`;
      return;
    }
    wrap.innerHTML = reviewsCache.map(r=> `
      <div class="review-card">
        <div class="review-meta">
          <span class="review-book">${r.bookTitle}</span>
          <span class="review-author">${r.authorName || r.reviewer}</span>
          <span class="review-date">${toKoreanDate(r.date)}</span>
          ${r.isAnon ? '<span class="anon-tag">학생에게는 익명으로 표시됨</span>' : ''}
        </div>
        <div class="review-text">${escapeHtml(r.text)}</div>
      </div>
    `).join('');
  }

  function populateRegisterCategories(){
    const select = document.getElementById('register-category');
    select.innerHTML = CATEGORIES.map(c=> `<option value="${c}">${c}</option>`).join('');
  }
  populateRegisterCategories();

  document.getElementById('btn-import-defaults').addEventListener('click', async ()=>{
    const btn = document.getElementById('btn-import-defaults');
    btn.disabled = true;
    btn.textContent = '가져오는 중...';
    try{
      const result = await importDefaultBooks();
      if(result.added === 0 && result.updated === 0){
        showToast('이미 모두 등록되어 있습니다.');
      } else {
        showToast(`${result.added}권 추가, ${result.updated}권 저자 정보 보완 완료.`);
      }
    } catch(e){
      showToast('가져오는 중 오류가 발생했습니다. 다시 시도해주세요.');
    } finally {
      btn.disabled = false;
      btn.textContent = '기본 도서 가져오기';
    }
  });

  document.getElementById('btn-open-register').addEventListener('click', ()=>{
    editingBookId = null;
    document.getElementById('register-eyebrow').textContent = '신규 도서 등록';
    document.getElementById('register-heading').textContent = '새 도서 정보를 입력해주세요';
    document.getElementById('register-submit').textContent = '등록하기';
    document.getElementById('register-title').value = '';
    document.getElementById('register-author').value = '';
    document.getElementById('register-category').value = CATEGORIES[0];
    document.getElementById('register-error').textContent = '';
    document.getElementById('register-veil').classList.remove('hidden');
  });

  function openEditBook(book){
    editingBookId = book.id;
    document.getElementById('register-eyebrow').textContent = '도서 정보 수정';
    document.getElementById('register-heading').textContent = `${book.title} 정보를 수정해주세요`;
    document.getElementById('register-submit').textContent = '수정하기';
    document.getElementById('register-title').value = book.title;
    document.getElementById('register-author').value = book.author || '';
    document.getElementById('register-category').value = book.category;
    document.getElementById('register-error').textContent = '';
    document.getElementById('register-veil').classList.remove('hidden');
  }

  document.getElementById('register-cancel').addEventListener('click', ()=>{
    document.getElementById('register-veil').classList.add('hidden');
  });

  document.getElementById('register-submit').addEventListener('click', async ()=>{
    const title = document.getElementById('register-title').value.trim();
    const author = document.getElementById('register-author').value.trim();
    const category = document.getElementById('register-category').value;
    const err = document.getElementById('register-error');
    const btn = document.getElementById('register-submit');

    if(!title){
      err.textContent = '책 이름을 입력해주세요.';
      return;
    }
    const duplicate = booksCache.some(b=> b.title === title && b.id !== editingBookId);
    if(duplicate){
      err.textContent = '이미 등록된 책 이름입니다.';
      return;
    }
    err.textContent = '';
    btn.disabled = true;

    try{
      if(editingBookId){
        await updateDoc(doc(db, 'books', editingBookId), {
          title, author: author || null, category
        });
        showToast(`${title} 정보가 수정되었습니다.`);
      } else {
        await addDoc(collection(db, 'books'), {
          title, author: author || null, category,
          status:'available', borrower:null, phone:null, loanDate:null, returnDate:null, purpose:null
        });
        showToast(`${title} 도서가 등록되었습니다.`);
      }
      document.getElementById('register-veil').classList.add('hidden');
      editingBookId = null;
    } catch(e){
      err.textContent = '저장 중 오류가 발생했습니다. 다시 시도해주세요.';
    } finally {
      btn.disabled = false;
    }
  });

  document.getElementById('login-password').addEventListener('keydown', e=>{
    if(e.key === 'Enter') document.getElementById('btn-login').click();
  });
  document.getElementById('signup-phone').addEventListener('keydown', e=>{
    if(e.key === 'Enter') document.getElementById('btn-signup').click();
  });

</script>

</body>
</html>
